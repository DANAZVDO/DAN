(function(){var c=document.getElementById('floatingDots');if(!c)return;var dots=[],mx=innerWidth/2,my=innerHeight/2;var colors=['rgba(201,168,76,.28)','rgba(201,168,76,.2)','rgba(212,168,83,.22)','rgba(201,168,76,.32)'];for(var i=0;i<25;i++){var d=document.createElement('div');d.className='floating-dot';var s=8+Math.random()*16;d.style.width=s+'px';d.style.height=s+'px';d.style.background=colors[i%4];d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.boxShadow='0 0 '+s*3+'px '+colors[i%4];c.appendChild(d);var r=d.getBoundingClientRect();dots.push({el:d,x:r.left,y:r.top,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,ox:parseFloat(d.style.left),oy:parseFloat(d.style.top)})}document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY},{passive:true});function step(){dots.forEach(function(dt){var dx=mx-dt.x,dy=my-dt.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<300){var f=(300-dist)/300*.2;dt.vx-=dx*f*.002;dt.vy-=dy*f*.002}dt.vx*=0.997;dt.vy*=0.997;dt.x+=dt.vx;dt.y+=dt.vy;if(dt.x<-20)dt.x=innerWidth+20;if(dt.x>innerWidth+20)dt.x=-20;if(dt.y<-20)dt.y=innerHeight+20;if(dt.y>innerHeight+20)dt.y=-20;var tx=dt.x-dt.el.offsetWidth/2,ty=dt.y-dt.el.offsetHeight/2;dt.el.style.left=tx+'px';dt.el.style.top=ty+'px'});requestAnimationFrame(step)}step()})();
</script>
